<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimorApps | Something Big is Coming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        overflow-x: hidden;
      }

      .gradient-text {
        background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .bg-grid {
        background-image: radial-gradient(#1e293b 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body
    class="bg-grid text-slate-200 min-h-screen flex flex-col items-center justify-center p-6"
  >
    <div
      class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none"
    >
      <div
        class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/10 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/10 rounded-full blur-[120px]"
      ></div>
    </div>

    <main class="max-w-4xl w-full text-center space-y-12">
      <div class="flex justify-center mb-8">
        <div
          class="w-24 h-24 bg-gradient-to-br from-blue-600 to-purple-600 rounded-3xl shadow-2xl flex items-center justify-center animate-float"
        >
          <i class="fas fa-rocket text-4xl text-white"></i>
        </div>
      </div>

      <div class="space-y-4">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight">
          <span class="block">TimorApps</span>
          <span class="gradient-text">Coming Soon</span>
        </h1>
        <p
          class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto leading-relaxed"
        >
          We are crafting high-quality mobile experiences for the Next
          Generation. Our apps are currently in the final stages of review for
          the App Store and Play Store.
        </p>
      </div>

      <div
        class="glass-card p-8 md:p-12 rounded-3xl max-w-lg mx-auto shadow-2xl transition-all hover:border-slate-700"
      >
        <h2 class="text-xl font-semibold mb-6">Get notified when we launch</h2>
        <form id="notifyForm" class="flex flex-col md:flex-row gap-3">
          <input
            id="emailInput"
            type="email"
            placeholder="Enter your email address"
            required
            class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white"
          />
          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl transition-all transform active:scale-95 shadow-lg shadow-blue-900/20 disabled:opacity-50"
          >
            Notify Me
          </button>
        </form>
        <p id="responseMsg" class="mt-4 text-sm hidden"></p>
      </div>

      <div
        class="flex flex-wrap justify-center gap-6 opacity-50 grayscale hover:grayscale-0 transition-all"
      >
        <div class="flex items-center gap-2">
          <i class="fab fa-apple text-2xl"></i>
          <span class="text-sm font-medium">Pending App Store</span>
        </div>
        <div class="flex items-center gap-2">
          <i class="fab fa-google-play text-2xl"></i>
          <span class="text-sm font-medium">Pending Play Store</span>
        </div>
      </div>
    </main>

    <footer class="mt-20 flex flex-col items-center gap-6">
      <p class="text-slate-500 text-sm">
        &copy; 2024 TimorApps. All rights reserved.
      </p>
    </footer>

    <!-- Firebase Integration -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      // Configuration setup
      const firebaseConfig = JSON.parse(__firebase_config);
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId = typeof __app_id !== "undefined" ? __app_id : "timor-apps";

      let currentUser = null;

      // Initialize Anonymous Auth
      const initAuth = async () => {
        try {
          await signInAnonymously(auth);
        } catch (error) {
          console.error("Auth failed:", error);
        }
      };
      initAuth();

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
      });

      const form = document.getElementById("notifyForm");
      const msg = document.getElementById("responseMsg");
      const emailInput = document.getElementById("emailInput");
      const submitBtn = form.querySelector("button");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!currentUser) {
          msg.textContent = "Please wait a moment and try again.";
          msg.className = "mt-4 text-sm text-red-400 block";
          return;
        }

        const email = emailInput.value;
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending...";

        try {
          // Save to public data collection for leads
          const leadsRef = collection(
            db,
            "artifacts",
            appId,
            "public",
            "data",
            "waitlist",
          );
          await addDoc(leadsRef, {
            email: email,
            timestamp: serverTimestamp(),
            userAgent: navigator.userAgent,
          });

          msg.textContent = "Success! You're on the list.";
          msg.className = "mt-4 text-sm text-green-400 block";
          form.reset();
        } catch (error) {
          console.error("Error adding document: ", error);
          msg.textContent = "Something went wrong. Please try again.";
          msg.className = "mt-4 text-sm text-red-400 block";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Notify Me";
          setTimeout(() => {
            msg.classList.add("opacity-0");
            setTimeout(() => {
              msg.classList.add("hidden");
              msg.classList.remove("opacity-0");
            }, 500);
          }, 4000);
        }
      });
    </script>
  </body>
</html>
